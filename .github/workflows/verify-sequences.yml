name: Verify Sequences

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run manifest testCommand values"
        required: false
        default: false
        type: boolean

jobs:
  verify-sequences:
    name: Verify sequence smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Python version
        run: python3 --version

      - name: Compile smoke script
        run: python3 -m compileall scripts/verify-sequences.py

      - name: Verify sequences
        run: python3 scripts/verify-sequences.py

      - name: Verify sequences with tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tests }}
        run: python3 scripts/verify-sequences.py --run-tests
